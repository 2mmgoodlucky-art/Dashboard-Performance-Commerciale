<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Appels - Performance</title>
    <style>
        body {
            background-color: #000000;
            color: #F95D07;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            margin: 0;
        }

        h1 {
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 2px solid #F95D07;
            padding-bottom: 10px;
            margin-bottom: 30px;
        }

        /* Cases de configuration */
        .config-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .config-box {
            background-color: #111;
            border: 2px solid #F95D07;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
        }

        .config-box label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .config-box input {
            background: transparent;
            border: none;
            color: #F95D07;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            width: 80%;
            outline: none;
        }

        .config-box .result-val {
            font-size: 24px;
            font-weight: bold;
        }

        /* Tableau */
        .table-container {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #111;
            border: 1px solid #333;
        }

        th {
            background-color: #F95D07;
            color: #000;
            padding: 15px;
            text-transform: uppercase;
            font-size: 13px;
        }

        td {
            padding: 12px;
            text-align: center;
            border: 1px solid #333;
            font-size: 14px;
        }

        .name-cell {
            text-align: left;
            padding-left: 20px;
            font-weight: bold;
        }

        /* Lignes cliquables */
        tbody tr:not(.total-row) {
            cursor: pointer;
            transition: opacity 0.3s;
        }

        tbody tr:not(.total-row):hover {
            background-color: #222;
            color: #ff8542;
        }

        tr:nth-child(even) {
            background-color: #0a0a0a;
        }

        .total-row {
            background-color: #F95D07 !important;
            color: #000 !important;
            font-weight: bold;
        }

        .instruction {
            text-align: center;
            font-size: 0.9em;
            margin-bottom: 10px;
            font-style: italic;
            opacity: 0.8;
        }

        .btn-reset {
            display: block;
            margin: 0 auto 20px auto;
            background-color: transparent;
            color: #F95D07;
            border: 1px solid #F95D07;
            padding: 5px 15px;
            cursor: pointer;
            border-radius: 5px;
        }

        .btn-reset:hover {
            background-color: #F95D07;
            color: #000;
        }

        .status-msg {
            text-align: center;
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 1.1em;
        }
    </style>
</head>
<body>

    <h1>Statistiques des Appels (Sécurisé Vercel)</h1>

    <div class="config-container">
        <div class="config-box">
            <label>Jours Travaillés</label>
            <input type="number" id="joursTravail" value="10" oninput="calculerObjectif()">
        </div>
        <div class="config-box">
            <label>Nb Appels Jour Min.</label>
            <input type="number" id="appelsMin" value="50" oninput="calculerObjectif()">
        </div>
        <div class="config-box">
            <label>Objectif Total</label>
            <div id="objectifResultat" class="result-val">-</div>
        </div>
    </div>

    <div id="statusMessage" class="status-msg">Connexion au serveur proxy sécurisé...</div>

    <p class="instruction">Cliquez sur une ligne pour la supprimer du calcul et du tableau</p>
    <button class="btn-reset" onclick="resetTableau()">Réinitialiser les données</button>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Commercial</th>
                    <th>Appels Sortants</th>
                    <th>Appels Reçus</th>
                    <th>Totaux Appels</th>
                </tr>
            </thead>
            <tbody id="tableBody">
            </tbody>
        </table>
    </div>

    <script>
        let donneesInitiales = [];
        let donneesAffichees = [];

        // Fonction pour appeler ton mini-serveur d'API sur Vercel
        function chargerDonneesZoho() {
            const statusDiv = document.getElementById('statusMessage');
            
            fetch("/api/zoho")
            .then(response => {
                if (!response.ok) {
                    throw new Error("Le serveur proxy n'a pas pu récupérer les données.");
                }
                return response.json();
            })
            .then(data => {
                statusDiv.style.color = "#00FF00";
                statusDiv.innerText = "Données synchronisées avec succès via Vercel !";
                
                if(data.data) {
                    donneesInitiales = data.data.map(item => {
                        const nomCommercial = item.Owner ? item.Owner.name : "Inconnu";
                        const estSortant = item.Call_Type === "Outbound" ? 1 : 0;
                        const estEntrant = item.Call_Type === "Inbound" ? 1 : 0;
                        
                        return {
                            nom: nomCommercial,
                            sortants: estSortant,
                            entrants: estEntrant,
                            total: 1
                        };
                    });

                    // Agrégation par commercial
                    const listeAgregee = {};
                    donneesInitiales.forEach(curr => {
                        if(!listeAgregee[curr.nom]) {
                            listeAgregee[curr.nom] = { nom: curr.nom, sortants: 0, entrants: 0, total: 0 };
                        }
                        listeAgregee[curr.nom].sortants += curr.sortants;
                        listeAgregee[curr.nom].entrants += curr.entrants;
                        listeAgregee[curr.nom].total += curr.total;
                    });

                    donneesInitiales = Object.values(listeAgregee);
                    donneesAffichees = [...donneesInitiales];
                    initialiserTableau();
                } else {
                    statusDiv.style.color = "#FFCC00";
                    statusDiv.innerText = "Aucun appel trouvé dans Zoho.";
                }
            })
            .catch(error => {
                console.error(error);
                statusDiv.style.color = "#FF0000";
                statusDiv.innerText = "Erreur de connexion : " + error.message;
            });
        }

        function initialiserTableau() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            let cumulS = 0, cumulE = 0, cumulT = 0;

            // Tri décroissant
            donneesAffichees.sort((a, b) => b.total - a.total);

            donneesAffichees.forEach((d, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="name-cell">${d.nom}</td>
                    <td>${d.sortants}</td>
                    <td>${d.entrants}</td>
                    <td>${d.total}</td>
                `;
                row.onclick = () => supprimerLigne(index);
                tbody.appendChild(row);
                
                cumulS += d.sortants;
                cumulE += d.entrants;
                cumulT += d.total;
            });

            // Ligne de total
            const totalRow = document.createElement('tr');
            totalRow.className = 'total-row';
            totalRow.innerHTML = `
                <td class="name-cell">TOTAL SÉLECTION</td>
                <td>${cumulS}</td>
                <td>${cumulE}</td>
                <td>${cumulT}</td>
            `;
            tbody.appendChild(totalRow);
        }

        function supprimerLigne(index) {
            donneesAffichees.splice(index, 1);
            initialiserTableau();
        }

        function resetTableau() {
            donneesAffichees = [...donneesInitiales];
            initialiserTableau();
        }

        function calculerObjectif() {
            const joursInput = document.getElementById('joursTravail');
            const minJourInput = document.getElementById('appelsMin');
            
            const jours = parseFloat(joursInput.value) || 0;
            const minJour = parseFloat(minJourInput.value) || 0;
            
            const objectif = jours * minJour;
            document.getElementById('objectifResultat').innerText = objectif;
        }

        // Chargement initial
        calculerObjectif();
        chargerDonneesZoho();
    </script>
</body>
</html>
